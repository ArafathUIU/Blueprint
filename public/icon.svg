<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="64" height="64" rx="14"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#18181B"/>
  <g clip-path="url(#iconClip)">
    <!-- Connecting lines (flow: TL -> TR -> ML -> BR -> BL) -->
    <line x1="22" y1="14" x2="36" y2="14" stroke="#DC2626" stroke-width="1.5" opacity="0.8"/>
    <line x1="42" y1="20" x2="24" y2="28" stroke="#DC2626" stroke-width="1.5" opacity="0.8"/>
    <line x1="22" y1="38" x2="36" y2="32" stroke="#DC2626" stroke-width="1.5" opacity="0.8"/>
    <line x1="36" y1="38" x2="24" y2="46" stroke="#DC2626" stroke-width="1.5" opacity="0.8"/>

    <!-- Diamond 1: Top-Left -->
    <polygon points="16,8 22,14 16,20 10,14" fill="#18181B" stroke="#FFFFFF" stroke-width="1"/>
    <!-- Diamond 2: Top-Right -->
    <polygon points="42,8 48,14 42,20 36,14" fill="#18181B" stroke="#FFFFFF" stroke-width="1"/>
    <!-- Diamond 3: Middle-Left (accent) -->
    <polygon points="16,26 22,32 16,38 10,32" fill="#DC2626" stroke="#FFFFFF" stroke-width="1"/>
    <!-- Diamond 4: Bottom-Right -->
    <polygon points="42,26 48,32 42,38 36,32" fill="#18181B" stroke="#FFFFFF" stroke-width="1"/>
    <!-- Diamond 5: Bottom-Left -->
    <polygon points="16,44 22,50 16,56 10,50" fill="#18181B" stroke="#FFFFFF" stroke-width="1"/>
  </g>
</svg>
